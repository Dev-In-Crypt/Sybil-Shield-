name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test stack
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from api-test
      - name: Run ML suite
        run: docker compose -f docker-compose.test.yml run --rm ml-test
