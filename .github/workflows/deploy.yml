name: Deploy

# Auto-deploys the API + worker + ML containers to the Hetzner VPS after CI
# passes on main. Vercel handles the web app separately on its own webhook.
#
# Required repository secrets:
#   DEPLOY_SSH_HOST       — e.g. 178.105.176.105
#   DEPLOY_SSH_USER       — e.g. sybil
#   DEPLOY_SSH_KEY        — private key (ed25519) with passphrase NONE.
#                            Public half installed in /home/sybil/.ssh/authorized_keys
#   DEPLOY_HEALTH_URL     — e.g. https://api.sybilshield.org/health
#   (optional) DEPLOY_DISCORD_WEBHOOK — Discord webhook for success/failure pings

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for diff context only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -e
          # Validate that secrets are actually set — GH Actions doesn't fail
          # the job for unset secrets, you just get empty strings.
          missing=""
          [ -z "$DEPLOY_SSH_KEY" ]  && missing="$missing DEPLOY_SSH_KEY"
          [ -z "$DEPLOY_SSH_HOST" ] && missing="$missing DEPLOY_SSH_HOST"
          [ -z "$DEPLOY_SSH_USER" ] && missing="$missing DEPLOY_SSH_USER"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secrets:$missing"
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

          mkdir -p ~/.ssh
          # printf preserves the key's newlines exactly (echo can mangle them).
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Validate key parses before we try to ssh — better error than a
          # cryptic auth failure later.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is not a valid private key."
            echo "Generate one with: ssh-keygen -t ed25519 -f deploy_key -N ''"
            echo "Then paste the *entire* deploy_key file (incl BEGIN/END lines) into the secret."
            exit 1
          fi

          # Trust the host — but don't let a transient DNS hiccup fail the step.
          ssh-keyscan -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          if ! grep -q . ~/.ssh/known_hosts; then
            echo "::warning::ssh-keyscan produced no output for $DEPLOY_SSH_HOST — falling back to StrictHostKeyChecking=accept-new"
            echo "Host $DEPLOY_SSH_HOST" >> ~/.ssh/config
            echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
            echo "  UserKnownHostsFile ~/.ssh/known_hosts" >> ~/.ssh/config
          fi
          echo "ok: key installed, host fingerprint stored"

      - name: Pull + rebuild + restart
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$USER@$HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd ~/sybilshield
          echo "==> git pull"
          git fetch --quiet origin main
          BEFORE=$(git rev-parse HEAD)
          git reset --hard origin/main
          AFTER=$(git rev-parse HEAD)
          echo "moved $BEFORE -> $AFTER"

          # Detect which services need rebuilding from the changed paths.
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || true)
          REBUILD=""
          if echo "$CHANGED" | grep -qE '^(apps/api/|docker-compose|package(-lock)?\.json|pnpm-lock\.yaml)'; then
            REBUILD="$REBUILD api worker migrate"
          fi
          if echo "$CHANGED" | grep -qE '^(apps/ml/|docker-compose|requirements)'; then
            REBUILD="$REBUILD ml"
          fi

          if [ -z "$REBUILD" ]; then
            echo "==> no infra-relevant changes; skipping rebuild"
          else
            echo "==> rebuilding:$REBUILD"
            # shellcheck disable=SC2086
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build $REBUILD
          fi

          # Always restart worker so it picks up env / code changes that
          # don't touch its image layers (e.g. a typescript constant tweak).
          docker compose -f docker-compose.yml -f docker-compose.prod.yml restart worker || true

          # Prune dangling images so disk doesn't fill up over months of deploys.
          docker image prune -f >/dev/null
          REMOTE

      - name: Wait + health-check
        env:
          HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          sleep 10
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/h -w '%{http_code}' "${HEALTH_URL:-https://api.sybilshield.org/health}" || echo 000)
            echo "health attempt $i: $code"
            if [ "$code" = "200" ]; then
              cat /tmp/h
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 6 attempts"
          cat /tmp/h || true
          exit 1

      - name: Notify Discord (success)
        if: success() && env.DEPLOY_DISCORD_WEBHOOK != ''
        env:
          DEPLOY_DISCORD_WEBHOOK: ${{ secrets.DEPLOY_DISCORD_WEBHOOK }}
          SHA: ${{ github.sha }}
        run: |
          curl -sS -X POST -H "content-type: application/json" -d "{\"content\":\"✅ deploy ok: ${SHA:0:7}\"}" "$DEPLOY_DISCORD_WEBHOOK" || true

      - name: Notify Discord (failure)
        if: failure() && env.DEPLOY_DISCORD_WEBHOOK != ''
        env:
          DEPLOY_DISCORD_WEBHOOK: ${{ secrets.DEPLOY_DISCORD_WEBHOOK }}
          SHA: ${{ github.sha }}
        run: |
          curl -sS -X POST -H "content-type: application/json" -d "{\"content\":\"❌ deploy FAILED on ${SHA:0:7} — check Actions tab\"}" "$DEPLOY_DISCORD_WEBHOOK" || true
