# Production override — apply alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs base:
#   - postgres + redis NO longer expose ports to the host (only docker-network access)
#   - api exposed only on 127.0.0.1:3001 (nginx proxies from outside, no direct internet)
#   - secrets read from .env (loaded automatically by docker compose)
#   - worker + ml read USE_MOCK_PROVIDERS from .env so you can swap to real Alchemy
#   - postgres volume mounted into a path you can back up

services:
  postgres:
    ports: !reset          # drop the host:5432 binding from base entirely
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sybilshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sybilshield}
    restart: unless-stopped

  redis:
    ports: !reset
    restart: unless-stopped

  ml:
    ports: !reset          # ml is only reachable via docker network (api→ml)
    environment:
      USE_MOCK_PROVIDERS: ${USE_MOCK_PROVIDERS:-true}
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY:-}
      ML_MODEL_PATH: ${ML_MODEL_PATH:-}
    restart: unless-stopped

  api:
    ports: !override
      - "127.0.0.1:3001:3001"        # only nginx (localhost) can reach it
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sybilshield}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sybilshield}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8001
      API_PORT: "3001"
      API_HOST: "0.0.0.0"
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_DEVELOPER: ${STRIPE_PRICE_DEVELOPER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      ATLOS_MERCHANT_ID: ${ATLOS_MERCHANT_ID:-}
      ATLOS_API_SECRET: ${ATLOS_API_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  migrate:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sybilshield}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sybilshield}
    restart: "no"

  worker:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sybilshield}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sybilshield}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8001
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-rule_based}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    restart: unless-stopped
