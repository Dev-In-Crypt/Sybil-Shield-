# Railway deployment manifest for SybilShield backend (api + ml + worker)
#
# Usage:
#   1. Install Railway CLI: npm i -g @railway/cli
#   2. railway login
#   3. railway init  (or link existing project)
#   4. railway up
#
# Each service gets its own deployment, sharing one Postgres + Redis plugin.

[[services]]
name = "api"
[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
target = "runtime"
[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "ml"
[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/ml/Dockerfile"
target = "service"
[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
startCommand = "uvicorn sybilshield.service:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"

[[services]]
name = "worker"
[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
target = "deps"
[services.deploy]
startCommand = "npx tsx src/workers/analyze.worker.ts"
restartPolicyType = "ON_FAILURE"

[[services]]
name = "migrate"
[services.build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
target = "deps"
[services.deploy]
startCommand = "npx tsx src/db/migrate.ts && echo migrations applied"
restartPolicyType = "NEVER"
